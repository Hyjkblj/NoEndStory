<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音色功能测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .voice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .voice-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        .voice-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        .voice-name {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .voice-style {
            font-size: 12px;
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .voice-description {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .preview-text {
            font-style: italic;
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 12px;
            padding: 8px;
            background: #f9fafb;
            border-radius: 6px;
        }
        .play-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .play-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }
        .play-button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
        }
        .category-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #ef4444;
            background: #fef2f2;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 音色功能测试</h1>
        <div id="loading" class="loading">正在加载音色列表...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="voices-container"></div>
    </div>

    <script>
        let currentAudio = null;
        let playingButton = null;

        async function loadVoices() {
            try {
                const response = await fetch('/api/v1/tts/presets');
                const data = await response.json();
                
                if (data.code === 200) {
                    displayVoices(data.data.voices);
                    document.getElementById('loading').style.display = 'none';
                } else {
                    throw new Error(data.message || '获取音色列表失败');
                }
            } catch (error) {
                console.error('加载音色失败:', error);
                document.getElementById('loading').style.display = 'none';
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = `加载失败: ${error.message}`;
                errorDiv.style.display = 'block';
            }
        }

        function displayVoices(voices) {
            const container = document.getElementById('voices-container');
            container.innerHTML = '';

            Object.entries(voices).forEach(([category, voiceList]) => {
                if (voiceList.length === 0) return;

                const categoryTitle = document.createElement('div');
                categoryTitle.className = 'category-title';
                categoryTitle.textContent = getCategoryName(category);
                container.appendChild(categoryTitle);

                const grid = document.createElement('div');
                grid.className = 'voice-grid';

                voiceList.forEach(voice => {
                    const card = createVoiceCard(voice);
                    grid.appendChild(card);
                });

                container.appendChild(grid);
            });
        }

        function getCategoryName(category) {
            const names = {
                'female': '👩 女声音色',
                'male': '👨 男声音色',
                'neutral': '🤖 中性音色',
                'custom': '🎨 自定义音色'
            };
            return names[category] || category;
        }

        function createVoiceCard(voice) {
            const card = document.createElement('div');
            card.className = 'voice-card';

            card.innerHTML = `
                <div class="voice-name">${voice.name}</div>
                <div class="voice-style">${voice.style || '标准'}</div>
                <div class="voice-description">${voice.description || ''}</div>
                <div class="preview-text">"${voice.preview_text || '你好，这是试听。'}"</div>
                <button class="play-button" onclick="playVoice('${voice.id}', this)">
                    🔊 试听
                </button>
            `;

            return card;
        }

        async function playVoice(voiceId, button) {
            // 停止当前播放的音频
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
                if (playingButton) {
                    playingButton.textContent = '🔊 试听';
                    playingButton.disabled = false;
                }
            }

            // 如果点击的是正在播放的按钮，则停止播放
            if (playingButton === button) {
                playingButton = null;
                return;
            }

            try {
                button.textContent = '⏳ 生成中...';
                button.disabled = true;
                playingButton = button;

                const response = await fetch('/api/v1/tts/preview', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        preset_voice_id: voiceId
                    })
                });

                const data = await response.json();

                if (data.code === 200 && data.data.audio_url) {
                    button.textContent = '⏸️ 停止';
                    
                    currentAudio = new Audio(data.data.audio_url);
                    currentAudio.onended = () => {
                        button.textContent = '🔊 试听';
                        button.disabled = false;
                        currentAudio = null;
                        playingButton = null;
                    };
                    currentAudio.onerror = () => {
                        button.textContent = '❌ 播放失败';
                        setTimeout(() => {
                            button.textContent = '🔊 试听';
                            button.disabled = false;
                        }, 2000);
                        currentAudio = null;
                        playingButton = null;
                    };
                    
                    await currentAudio.play();
                } else {
                    throw new Error(data.message || '生成音频失败');
                }
            } catch (error) {
                console.error('播放音色失败:', error);
                button.textContent = '❌ 失败';
                setTimeout(() => {
                    button.textContent = '🔊 试听';
                    button.disabled = false;
                }, 2000);
                playingButton = null;
            }
        }

        // 页面加载时获取音色列表
        window.addEventListener('DOMContentLoaded', loadVoices);
    </script>
</body>
</html>
